services:
  mongo:
    image: mongo:7
    container_name: portfolio-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: portfolio-backend
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      MONGODB_URI: mongodb://mongo:27017/investment_portfolio_tracker
      CLIENT_URL: http://localhost:5173
      DEMO_USER_ID: demo-user-001
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: portfolio-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    depends_on:
      - backend

volumes:
  mongo_data:
